services:
  postgres:
    image: postgres:16-alpine
    container_name: dnd_tg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dnd_tg_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dnd_tg_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        VITE_API_BASE_URL: /api
    container_name: dnd_tg_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 4000
      STATIC_ROOT: /app/apps/web/dist
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dnd_tg_app
      TEST_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dnd_tg_app_test
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('node:http').get('http://127.0.0.1:4000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
